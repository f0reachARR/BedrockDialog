name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set release version in gradle.properties
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: sed -i -E "s|^version=.*|version=${RELEASE_VERSION}|" gradle.properties

      - name: Build and publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          RELEASE_CHANGELOG: ${{ github.event.release.body }}
        run: ./gradlew modrinth --stacktrace

      - name: Compute next snapshot version
        id: next
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          BASE="${RELEASE_VERSION%%-*}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$BASE"
          if ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Cannot parse patch from version: $RELEASE_VERSION" >&2
            exit 1
          fi
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Resolve App bot identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Bump to next snapshot on main
        env:
          NEXT_VERSION: ${{ steps.next.outputs.version }}
          GIT_AUTHOR_NAME: ${{ steps.bot.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.bot.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.bot.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.bot.outputs.email }}
        run: |
          git fetch origin main
          git switch main
          sed -i -E "s|^version=.*|version=${NEXT_VERSION}|" gradle.properties
          git add gradle.properties
          if git diff --cached --quiet; then
            echo "gradle.properties already at ${NEXT_VERSION}; nothing to commit."
          else
            git commit -m "chore: bump version to ${NEXT_VERSION}"
            git push origin main
          fi
