name: BedrockDialog
version: '${version}'
main: me.f0reach.bedrockdialog.BedrockDialogPlugin
api-version: '1.21'
bootstrapper: me.f0reach.bedrockdialog.BedrockDialogBootstrap
soft-dependencies:
  - name: Geyser-Spigot
    required: false
    load: BEFORE
  - name: Geyser-Paper
    required: false
    load: BEFORE

permissions:
  bedrockdialog.dialog.open:
    default: op
  bedrockdialog.dialog.reload:
    default: op
